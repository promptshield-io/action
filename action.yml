name: 'PromptShield Scan'
description: 'ESLint for Prompts. Scan your repository for prompt injection vulnerabilities and risks.'
branding:
  icon: 'shield'
  color: 'blue'
inputs:
  patterns:
    description: 'Glob patterns for scan'
    required: false
    default: '**/*'
  min-severity:
    description: 'Severity threshold (LOW, MEDIUM, HIGH, CRITICAL)'
    required: false
    default: 'LOW'
  no-inline-ignore:
    description: 'Disable source-code suppresses'
    required: false
    default: 'true'
  report:
    description: 'Generate and post Markdown audit'
    required: false
    default: 'true'
  scan-mode:
    description: 'Scan mode: "full" or "diff". "auto" defaults to diff for PR/Push, full otherwise.'
    required: false
    default: 'auto'
  token:
    description: 'GITHUB_TOKEN for PR comments'
    required: false
runs:
  using: 'node22'
  main: 'dist/index.js'
